services:
  burrow:
    build:
      context: .
      dockerfile: Dockerfile.burrow
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://wezel:wezel@db:5432/wezel}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_ORG: ${GITHUB_ORG}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

  anthill:
    build:
      context: .
      dockerfile: Dockerfile.anthill
      args:
        BURROW_UPSTREAM: http://burrow:3000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - burrow
