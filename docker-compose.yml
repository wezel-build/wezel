services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wezel
      POSTGRES_PASSWORD: wezel
      POSTGRES_DB: wezel
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wezel"]
      interval: 5s
      timeout: 5s
      retries: 10

  burrow:
    build:
      context: .
      dockerfile: Dockerfile.burrow
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://wezel:wezel@db:5432/wezel
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  anthill:
    build:
      context: .
      dockerfile: Dockerfile.anthill
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - burrow

volumes:
  db_data:
